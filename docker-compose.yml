services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper-smartcity
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-smartcity
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - data-net

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init-smartcity
    entrypoint: [ "bash", "-c", "
      echo 'Waiting for Kafka to be ready...';
      cub kafka-ready -b kafka:29092 1 30;
      echo 'Creating Kafka topics...';
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic smartcity.environment.readings --partitions 3 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic smartcity.water.readings --partitions 1 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic smartcity.traffic.readings --partitions 1 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic smartcity.spark.environment --partitions 1 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic smartcity.spark.water --partitions 1 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic smartcity.spark.traffic --partitions 1 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic smartcity.spark.errors --partitions 1 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic smartcity.spark.alerts --partitions 1 --replication-factor 1;
      echo 'Topics created successfully!';
      kafka-topics --bootstrap-server kafka:29092 --list;
      " ]
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - data-net

  mongodb:
    image: mongo:latest
    container_name: mongodb-smartcity
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - data-net

  node-red:
    image: nodered/node-red:latest
    container_name: nodered-smartcity
    ports:
      - "1880:1880"
    environment:
      - KAFKA_BROKERS=kafka:29092
    volumes:
      - ./node-red:/data
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:1880', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 3
    networks:
      - data-net

  backend:
    build: ./backend
    container_name: backend-smartcity
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGODB_URI=mongodb://mongodb:27017/smartcity
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - data-net
      - backend-net

  frontend:
    build: ./frontend
    container_name: frontend-smartcity
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:4000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - backend-net

  spark:
    build: ./spark
    container_name: spark-smartcity
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - DATA_LAKE_BASE_DIR=/app/data_lake
      - SPARK_CHECKPOINT_BASE_DIR=/app/checkpoints
    volumes:
      - ./data_lake:/app/data_lake
      - ./spark/checkpoints:/app/checkpoints
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - data-net

volumes:
  mongodb_data:

networks:
  data-net:
    driver: bridge
  backend-net:
    driver: bridge
